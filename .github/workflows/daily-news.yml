name: Tri-Lens Daily News

on:
  schedule:
    # Runs at 7:30 KST (22:30 UTC) daily
    # GitHub Actions cron can delay 5-30 min, so we trigger early to land around 8:00 KST
    - cron: '30 22 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Fetch news and send email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python scripts/daily_news.py